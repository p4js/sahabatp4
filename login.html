<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Sahabat P4</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/27y7zYsk/Desain-tanpa-judul-1.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-weight: 800;
            font-size: 24px;
            color: #1a5fa8;
            margin-bottom: 8px;
            display: block;
        }
        .tagline {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus {
            border-color: #1a5fa8;
            outline: none;
            box-shadow: 0 0 0 4px rgba(26, 95, 168, 0.1);
        }
        .btn-login {
            width: 100%;
            background: #1a5fa8;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #164e8a;
            transform: translateY(-2px);
        }
        #errorMsg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <span class="logo">Sahabat P4</span>
        <p class="tagline">Admin Control Panel</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="admin@p4jakarta.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="btnLogin">Sign In</button>
            <p id="errorMsg">Email atau password salah!</p>
        </form>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const error = document.getElementById('errorMsg');

            btn.innerText = 'Checking...';
            btn.disabled = true;
            error.style.display = 'none';

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    window.location.href = 'admin.html';
                })
                .catch((err) => {
                    console.error(err);
                    btn.innerText = 'Sign In';
                    btn.disabled = false;
                    error.style.display = 'block';
                });
        });

        // Jika sudah login, langsung lempar ke admin
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'admin.html';
        });
    </script>
</body>
</html>
